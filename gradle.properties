android.useAndroidX=true
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
# Network-share build hygiene (this repo is built over a share on the Windows host).
org.gradle.vfs.watch=false
org.gradle.caching=false
# Single-shot CI/jitpack builds: no daemon (avoids a pointless daemon racing the transforms cache
# on jitpack's ephemeral container).
org.gradle.daemon=false
